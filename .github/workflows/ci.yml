name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Formatting check
        run: uv run --frozen --extra dev --python ${{ matrix.python-version }} ruff format --check .

      - name: Lint check
        run: uv run --frozen --extra dev --python ${{ matrix.python-version }} ruff check .

      - name: Static analysis
        run: uv run --frozen --extra dev --python ${{ matrix.python-version }} mypy src tests

      - name: Tests
        run: uv run --frozen --extra dev --python ${{ matrix.python-version }} pytest

      - name: Build package
        run: uv build

      - name: Wheel smoke test
        run: |
          wheel_venv="${RUNNER_TEMP}/guerilla-wheel-test-${{ matrix.python-version }}"
          uv venv "${wheel_venv}" --python ${{ matrix.python-version }}
          uv pip install --python "${wheel_venv}/bin/python" dist/*.whl --no-deps
          cd "${RUNNER_TEMP}"
          "${wheel_venv}/bin/python" -c "import guerilla; print(guerilla.__version__)"
          "${wheel_venv}/bin/guerilla" --version
          "${wheel_venv}/bin/guerilla" --help
          "${wheel_venv}/bin/guerilla" version --json
          test ! -e "${RUNNER_TEMP}/.guerilla"
